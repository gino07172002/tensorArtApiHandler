<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tensor API QA Console | Metadata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="metadata">
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Pure Frontend QA Tool</p>
        <h1>Metadata</h1>
        <p class="hero-copy">讀取 PNG / JPEG 內的 AI 參數，並套用到 Send Request 的 Body。</p>
      </div>
      <div class="hero-actions">
        <button type="button" id="export-storage" class="ghost-button">匯出設定</button>
        <button type="button" id="import-storage" class="ghost-button">匯入設定</button>
        <button type="button" id="clear-storage" class="ghost-button">清除 localStorage</button>
        <input id="import-storage-file" type="file" accept="application/json" hidden>
      </div>
    </header>

    <nav class="page-nav">
      <a class="page-link" href="./index.html">Dashboard</a>
      <a class="page-link" href="./gallery.html">Query / Gallery / Post</a>
      <a class="page-link is-active" href="./metadata.html">Metadata</a>
    </nav>

    <main class="single-column">
      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Image Metadata</p>
            <h2>讀取與套用</h2>
          </div>
          <div class="button-row compact-row">
            <button type="button" id="metadata-apply" class="primary-button">套用到 Send Request</button>
          </div>
        </div>

        <label class="field">
          <span>選擇圖片</span>
          <input id="metadata-file" type="file" accept="image/png,image/jpeg,image/jpg">
        </label>

        <label class="field">
          <span>解析結果</span>
          <pre id="metadata-output" class="response-box"></pre>
        </label>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
